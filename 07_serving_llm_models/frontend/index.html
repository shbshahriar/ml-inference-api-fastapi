<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Health Advisor</title>

  <!-- Tailwind CSS — utility-first CSS framework loaded from CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!--
    Custom styles — loaded via FastAPI's /static mount.
    NOTE: This page must be opened through the FastAPI server at
    http://127.0.0.1:8000, not by double-clicking the HTML file.
  -->
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body class="min-h-screen bg-stone-50 text-stone-800">

  <!-- ═══════════════════════════════════════════════════════════════
       HEADER — App title and subtitle
  ════════════════════════════════════════════════════════════════ -->
  <header class="bg-white border-b border-stone-200 px-6 py-4 flex items-center gap-3 shadow-sm">

    <!-- Health cross badge -->
    <div class="w-10 h-10 rounded-full bg-amber-500 flex items-center justify-center text-white font-black text-xl select-none">
      ✚
    </div>

    <div>
      <h1 class="text-lg font-bold text-stone-800 leading-tight">AI Health Advisor</h1>
      <p class="text-xs text-stone-400">Powered by LangChain &amp; OpenAI — for educational use only</p>
    </div>

  </header>

  <!-- ═══════════════════════════════════════════════════════════════
       MAIN CONTENT
  ════════════════════════════════════════════════════════════════ -->
  <main class="max-w-3xl mx-auto px-4 py-8 space-y-6">

    <!-- ── Info Banner ─────────────────────────────────────────── -->
    <div class="bg-amber-50 border border-amber-200 rounded-xl px-5 py-3 text-sm text-amber-800 flex items-start gap-2">
      <span class="mt-0.5 text-base">ℹ</span>
      <span>Fill in your profile and describe your health concern. The AI will provide personalized lifestyle advice based on your inputs.</span>
    </div>

    <!-- ── Patient Profile Card ────────────────────────────────── -->
    <div class="bg-white rounded-2xl shadow-sm border border-stone-200 p-6">
      <h2 class="text-xs font-bold text-amber-600 uppercase tracking-widest mb-5">
        Patient Profile
      </h2>

      <!-- 2-column grid for profile fields -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">

        <!-- Full Name — required (min 5, max 50 chars) -->
        <div class="field-group">
          <label class="field-label">
            Full Name <span class="required-star">*</span>
          </label>
          <input
            id="name"
            type="text"
            placeholder="e.g. Alice Smith"
            minlength="5"
            maxlength="50"
            class="field-input"
          />
        </div>

        <!-- Age — required (0–120) -->
        <div class="field-group">
          <label class="field-label">
            Age <span class="required-star">*</span>
          </label>
          <input
            id="age"
            type="number"
            placeholder="e.g. 30"
            min="0"
            max="120"
            class="field-input"
          />
        </div>

        <!-- Gender — required Literal["male", "female"] -->
        <div class="field-group">
          <label class="field-label">
            Gender <span class="required-star">*</span>
          </label>
          <select id="gender" class="field-input">
            <option value="">Select gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </div>

        <!-- City — optional -->
        <div class="field-group">
          <label class="field-label">
            City <span class="optional-tag">(optional)</span>
          </label>
          <input
            id="city"
            type="text"
            placeholder="e.g. New York"
            maxlength="100"
            class="field-input"
          />
        </div>

        <!-- Height — optional, in centimeters -->
        <div class="field-group">
          <label class="field-label">
            Height <span class="optional-tag">(cm, optional)</span>
          </label>
          <input
            id="height"
            type="number"
            placeholder="e.g. 175"
            min="0"
            max="300"
            step="0.1"
            class="field-input"
          />
        </div>

        <!-- Weight — optional, in kilograms -->
        <div class="field-group">
          <label class="field-label">
            Weight <span class="optional-tag">(kg, optional)</span>
          </label>
          <input
            id="weight"
            type="number"
            placeholder="e.g. 70"
            min="0"
            max="500"
            step="0.1"
            class="field-input"
          />
        </div>

        <!-- Exercise Level — optional Literal["none","light","moderate","heavy"] -->
        <div class="field-group">
          <label class="field-label">
            Exercise Level <span class="optional-tag">(optional)</span>
          </label>
          <select id="exercise" class="field-input">
            <option value="">Select level</option>
            <option value="none">None</option>
            <option value="light">Light</option>
            <option value="moderate">Moderate</option>
            <option value="heavy">Heavy</option>
          </select>
        </div>

        <!-- Sleep Hours — optional, 0–24 -->
        <div class="field-group">
          <label class="field-label">
            Sleep Hours / Day <span class="optional-tag">(optional)</span>
          </label>
          <input
            id="sleep_hours"
            type="number"
            placeholder="e.g. 7.5"
            min="0"
            max="24"
            step="0.5"
            class="field-input"
          />
        </div>

        <!-- Smoking — optional pill-style radio buttons (full-width row) -->
        <div class="field-group sm:col-span-2">
          <label class="field-label">
            Smoking <span class="optional-tag">(optional)</span>
          </label>
          <div class="flex flex-wrap gap-3 mt-1">

            <!-- Default: No -->
            <label class="radio-pill">
              <input type="radio" name="smooking" value="no" checked />
              <span>No</span>
            </label>

            <label class="radio-pill">
              <input type="radio" name="smooking" value="yes" />
              <span>Yes</span>
            </label>

            <!-- Empty string → field omitted from the API payload -->
            <label class="radio-pill">
              <input type="radio" name="smooking" value="" />
              <span>Prefer not to say</span>
            </label>

          </div>
        </div>

      </div><!-- /grid -->
    </div><!-- /profile card -->

    <!-- ── Health Concern Card ─────────────────────────────────── -->
    <div class="bg-white rounded-2xl shadow-sm border border-stone-200 p-6">
      <h2 class="text-xs font-bold text-amber-600 uppercase tracking-widest mb-5">
        Your Health Concern
      </h2>

      <div class="field-group">
        <label class="field-label">
          Describe your concern <span class="required-star">*</span>
          <span class="optional-tag ml-1">(min 10 chars · Ctrl+Enter to submit)</span>
        </label>
        <textarea
          id="text"
          rows="5"
          minlength="10"
          maxlength="1000"
          placeholder="e.g. I've been feeling exhausted all day and struggling to focus at work..."
          class="field-input resize-none"
        ></textarea>
        <!-- Live character counter -->
        <p class="text-xs text-stone-400 mt-1 text-right">
          <span id="char-count">0</span> / 1000
        </p>
      </div>
    </div>

    <!-- ── Validation Error Box (hidden by default) ────────────── -->
    <div
      id="error-box"
      class="hidden bg-red-50 border border-red-200 text-red-700 rounded-xl px-5 py-4 text-sm"
    ></div>

    <!-- ── Submit Button ───────────────────────────────────────── -->
    <button
      id="submit-btn"
      onclick="submitForm()"
      class="w-full bg-amber-500 hover:bg-amber-600 active:scale-95 text-white font-bold py-3.5 rounded-xl transition-all duration-200 flex items-center justify-center gap-2 shadow-sm"
    >
      <span id="btn-text">Get Health Advice</span>
      <!-- Spinner — shown while waiting for the LLM response -->
      <span id="btn-spinner" class="hidden spinner"></span>
    </button>

    <!-- ── AI Response Card (hidden until a response arrives) ──── -->
    <div
      id="response-card"
      class="hidden bg-white rounded-2xl shadow-sm border border-amber-200 p-6"
    >
      <!-- Card header -->
      <div class="flex items-center gap-2 mb-4">
        <div class="w-8 h-8 rounded-full bg-amber-100 flex items-center justify-center text-amber-700 font-black text-sm select-none">
          AI
        </div>
        <h2 class="text-sm font-bold text-stone-700">Health Advisor Response</h2>
      </div>

      <!--
        Response text — rendered with a typewriter animation via script.js.
        The .typewriter class adds a blinking cursor; .done removes it.
      -->
      <div
        id="response-text"
        class="text-stone-700 text-sm leading-relaxed whitespace-pre-wrap typewriter"
      ></div>
    </div>

  </main><!-- /main -->

  <!-- JavaScript — loaded via FastAPI's /static mount -->
  <script src="/static/script.js"></script>

</body>
</html>
