<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Setup: Interactive Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: #1e293b;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .step-node.active {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 0 0 4px #e0e7ff;
        }

        .step-node.complete {
            background-color: #10b981;
            color: white;
        }

        .hide { display: none !important; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .browser-window {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            background: white;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .terminal-bg { background-color: #0f172a; }

        /* ── Section content fade-in ── */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* ── Green checkmark flash overlay ── */
        @keyframes checkFlash {
            0%   { opacity: 0; transform: scale(0.5); }
            30%  { opacity: 1; transform: scale(1.1); }
            70%  { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1); }
        }
        .check-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            pointer-events: none;
        }
        .check-overlay .check-icon {
            width: 96px; height: 96px;
            background: #10b981;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 48px;
            color: white;
            box-shadow: 0 0 40px rgba(16,185,129,0.5);
            animation: checkFlash 0.4s ease-in-out forwards;
        }

        /* ── Typewriter caret ── */
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
        .tw-caret::after {
            content: '_';
            animation: blink 0.6s step-end infinite;
            color: #34d399;
        }

        /* ── Code with line numbers ── */
        .code-with-lines {
            display: table;
            width: 100%;
        }
        .code-line {
            display: table-row;
        }
        .line-num {
            display: table-cell;
            width: 2.5rem;
            padding-right: 1rem;
            text-align: right;
            color: #4b5563;
            user-select: none;
            font-size: 0.75rem;
            vertical-align: top;
            padding-top: 1px;
        }
        .line-code {
            display: table-cell;
            white-space: pre-wrap;
            vertical-align: top;
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Top Header -->
    <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center shrink-0 z-10">

        <!-- Preview Side Panel -->

    <!-- Green checkmark overlay (injected by JS) -->

                    </div>`,
                terminal: "INFO:     StatReload detected changes...\nINFO:     Uvicorn running on http://127.0.0.1:8000",
                url: "http://127.0.0.1:8000/about",
                browser: '{\n  "project": "ML inference API using FastAPI"\n}',
                tip: "Each function represents a new 'task' your API can perform."

        ];

        let currentStep = 0;
        let sideTerminalTypeTimer = null;

        // ── Render nav ─────────────────────────────────────────────────────
        function renderNav() {
            const nav = document.getElementById('step-nav');
            nav.innerHTML = steps.map((s, i) => `
                <button onclick="jumpToStep(${i})" class="w-full flex items-center gap-4 p-3 rounded-xl transition-all hover:bg-slate-50">
                    <div class="step-node w-8 h-8 rounded-full flex items-center justify-center shrink-0 border-2 border-slate-200 font-bold text-xs
                        ${i === currentStep ? 'active' : (i < currentStep ? 'complete' : '')}">
                        ${i < currentStep ? '&#10003;' : i + 1}
                    </div>
                    <div class="text-left hidden md:block">
                        <p class="text-sm font-bold ${i === currentStep ? 'text-indigo-600' : 'text-slate-500'}">${s.title}</p>
                    </div>
                </button>
            `).join('');
        }

        // ── Update progress ────────────────────────────────────────────────
        function updateProgress() {
            const pct = Math.round(((currentStep + 1) / steps.length) * 100);
            document.getElementById('progress-bar').style.width = `${pct}%`;
            document.getElementById('progress-text').textContent = `${pct}% Complete`;
        }

        // ── Typewriter for side terminal ───────────────────────────────────
        function typeTerminal(text) {
            const el = document.getElementById('side-terminal');
            el.textContent = '';
            el.classList.add('tw-caret');
            if (sideTerminalTypeTimer) clearTimeout(sideTerminalTypeTimer);
            let i = 0;
            function step() {
                if (i < text.length) {
                    el.textContent += text[i];
                    i++;
                    sideTerminalTypeTimer = setTimeout(step, 20);
                } else {
                    el.classList.remove('tw-caret');
                }
            }
            step();
        }

        // ── Render content ─────────────────────────────────────────────────
        function renderContent() {
            const step = steps[currentStep];
            const display = document.getElementById('content-display');

            display.innerHTML = `
                <div class="animate-fade-in">
                    <div class="flex items-center gap-4 mb-6">
                        <span class="text-5xl">${step.icon}</span>
                        <h2 class="text-3xl font-extrabold text-slate-900">${step.title}</h2>
                    </div>
                    <p class="text-lg text-slate-600 leading-relaxed mb-8">${step.intro}</p>
                    <div class="space-y-6">
                        ${step.content}
                    </div>
                </div>`;

            // Update side panel with typewriter
            typeTerminal(step.terminal);
            document.getElementById('browser-url').textContent = step.url;
            document.getElementById('browser-content').textContent = step.browser;
            document.getElementById('pro-tip').textContent = step.tip;

            // Nav button states
            const prevBtn = document.getElementById('btn-prev');
            const nextBtn = document.getElementById('btn-next');
            prevBtn.disabled = (currentStep === 0);
            nextBtn.textContent = (currentStep === steps.length - 1) ? 'Finish Lab' : 'Continue to Next Step';

            updateProgress();
            renderNav();
        }

        // ── Green checkmark flash ──────────────────────────────────────────
        function flashCheck(callback) {
            const overlay = document.getElementById('check-overlay');
            overlay.classList.remove('hide');
            const icon = overlay.querySelector('.check-icon');
            // Reset animation
            icon.style.animation = 'none';
            requestAnimationFrame(() => {
                icon.style.animation = '';
                setTimeout(() => {
                    overlay.classList.add('hide');
                    if (callback) callback();
                }, 420);
            });
        }

        // ── Change step ────────────────────────────────────────────────────
        function changeStep(delta) {
            const next = currentStep + delta;
            if (next < 0 || next >= steps.length) return;

            if (delta > 0) {
                // Going forward: show checkmark flash first
                flashCheck(() => {
                    currentStep = next;
                    renderContent();
                    document.getElementById('main-area').scrollTo({ top: 0, behavior: 'smooth' });
                });
            } else {
                currentStep = next;
                renderContent();
                document.getElementById('main-area').scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function jumpToStep(idx) {
            currentStep = idx;
            renderContent();
            document.getElementById('main-area').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function restartLab() {
            currentStep = 0;
            renderContent();
            document.getElementById('main-area').scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ── Copy code helper ───────────────────────────────────────────────
        function copyCode(btn, text) {
            // Decode any HTML entities for copy
            const decoded = text.replace(/&quot;/g, '"').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>');
            navigator.clipboard.writeText(decoded).then(() => {
                const orig = btn.textContent;
                btn.textContent = '\u2713 Copied';
                btn.classList.add('bg-emerald-700','text-white');
                setTimeout(() => {
                    btn.textContent = orig;
                    btn.classList.remove('bg-emerald-700','text-white');
                }, 2000);
            });
        }

        // ── Keyboard navigation ────────────────────────────────────────────
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') changeStep(1);
            if (e.key === 'ArrowLeft')  changeStep(-1);
        });

        // ── Init ───────────────────────────────────────────────────────────
        window.onload = () => renderContent();
    </script>
